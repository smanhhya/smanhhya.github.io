<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تتبع طلبي | سمان ههيا</title>
    <meta name="theme-color" content="#166534">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- نفس إعدادات قاعدة البيانات الخاصة بك -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { primary: '#166534', accent: '#f59e0b' } },
                    fontFamily: { cairo: ['Cairo', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .step-active { color: #166534; font-weight: 900; }
        .step-inactive { color: #cbd5e1; }
        .line-active { background-color: #166534; }
        .line-inactive { background-color: #e2e8f0; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide { animation: slideUp 0.4s ease-out forwards; }
    </style>
</head>
<body class="text-slate-800 flex flex-col min-h-screen">

    <!-- الهيدر -->
    <header class="bg-white shadow-sm py-4 px-6 text-center border-b border-slate-200">
        <div class="w-12 h-12 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-2 text-brand-primary text-2xl">
            <i class="fa-solid fa-kiwi-bird"></i>
        </div>
        <h1 class="text-xl font-black tracking-tight">سمان ههيا</h1>
        <p class="text-xs text-slate-500 font-bold">بوابة تتبع الطلبات</p>
    </header>

    <main class="flex-1 max-w-md w-full mx-auto p-5 flex flex-col justify-center">
        
        <!-- شاشة إدخال الرقم -->
        <div id="login-section" class="bg-white p-6 rounded-3xl shadow-lg border border-slate-100 animate-slide">
            <h2 class="text-lg font-black text-center mb-2">فين أوردري؟ 🛵</h2>
            <p class="text-xs text-center text-slate-500 font-bold mb-6">اكتب رقم الموبايل اللي طلبت بيه عشان نتابع حالة طلبك لحظة بلحظة.</p>
            
            <div class="mb-4">
                <input type="tel" id="customer-phone" placeholder="رقم الموبايل (مثال: 010...)" class="w-full border-2 border-slate-200 rounded-xl p-4 text-center font-black outline-none focus:border-brand-primary transition-colors text-lg" dir="ltr">
            </div>
            
            <button onclick="trackOrder()" id="btn-track" class="w-full bg-brand-primary hover:bg-emerald-800 text-white font-black py-4 rounded-xl transition-all shadow-md active:scale-95 flex justify-center items-center gap-2">
                <i class="fa-solid fa-magnifying-glass"></i> تتبع الطلب
            </button>
            <p id="error-msg" class="hidden text-red-500 text-xs font-bold text-center mt-4 bg-red-50 p-2 rounded-lg"></p>
        </div>

        <!-- شاشة النتيجة (التتبع) -->
        <div id="result-section" class="hidden space-y-4">
            
            <!-- زرار الرجوع -->
            <button onclick="location.reload()" class="text-slate-400 hover:text-slate-600 text-sm font-bold flex items-center gap-1.5 mb-2">
                <i class="fa-solid fa-arrow-right"></i> بحث برقم آخر
            </button>

            <!-- كارت الولاء -->
            <div id="loyalty-card" class="bg-gradient-to-r from-amber-400 to-orange-500 rounded-2xl p-5 text-white shadow-lg animate-slide hidden relative overflow-hidden">
                <i class="fa-solid fa-crown absolute -left-4 -top-4 text-7xl opacity-20"></i>
                <h3 class="font-black text-lg mb-1 relative z-10">أهلاً بيك يا <span id="res-name" class="text-amber-100"></span>! 🎉</h3>
                <p id="loyalty-msg" class="text-sm font-bold opacity-90 relative z-10"></p>
            </div>

            <!-- كارت حالة الطلب -->
            <div class="bg-white rounded-3xl shadow-lg border border-slate-100 p-6 animate-slide" style="animation-delay: 0.1s;">
                <div class="flex justify-between items-center mb-6 border-b border-slate-50 pb-4">
                    <div>
                        <p class="text-[10px] text-slate-400 font-bold">حالة الطلب الحالي</p>
                        <h3 id="res-status-title" class="font-black text-brand-primary text-xl"></h3>
                    </div>
                    <div class="text-left">
                        <p class="text-[10px] text-slate-400 font-bold">الإجمالي</p>
                        <p class="font-black text-lg text-slate-800"><span id="res-total">0</span> <span class="text-xs">ج</span></p>
                    </div>
                </div>

                <!-- شريط التتبع (Timeline) -->
                <div class="relative flex justify-between items-center mb-6 px-2">
                    <div class="absolute top-1/2 left-4 right-4 h-1 bg-slate-100 -z-10 rounded-full -translate-y-1/2"></div>
                    <div id="progress-line" class="absolute top-1/2 right-4 h-1 bg-brand-primary -z-10 rounded-full -translate-y-1/2 transition-all duration-700" style="width: 0%;"></div>
                    
                    <!-- خطوة 1: المراجعة -->
                    <div class="flex flex-col items-center gap-2 bg-white px-1">
                        <div id="step-1-icon" class="w-8 h-8 rounded-full border-4 border-white shadow-sm flex items-center justify-center text-[10px] bg-slate-200 text-slate-400"><i class="fa-solid fa-clipboard-check"></i></div>
                        <span id="step-1-text" class="text-[9px] font-bold text-slate-400">مراجعة</span>
                    </div>
                    <!-- خطوة 2: التجهيز -->
                    <div class="flex flex-col items-center gap-2 bg-white px-1">
                        <div id="step-2-icon" class="w-8 h-8 rounded-full border-4 border-white shadow-sm flex items-center justify-center text-[10px] bg-slate-200 text-slate-400"><i class="fa-solid fa-box-open"></i></div>
                        <span id="step-2-text" class="text-[9px] font-bold text-slate-400">تجهيز</span>
                    </div>
                    <!-- خطوة 3: التوصيل -->
                    <div class="flex flex-col items-center gap-2 bg-white px-1">
                        <div id="step-3-icon" class="w-8 h-8 rounded-full border-4 border-white shadow-sm flex items-center justify-center text-[10px] bg-slate-200 text-slate-400"><i class="fa-solid fa-motorcycle"></i></div>
                        <span id="step-3-text" class="text-[9px] font-bold text-slate-400">في الطريق</span>
                    </div>
                </div>

                <p id="res-driver-note" class="text-xs font-bold text-slate-600 bg-slate-50 p-3 rounded-xl border border-slate-100 text-center mb-4 hidden"></p>

                <!-- تفاصيل المنتجات -->
                <div class="bg-slate-50 rounded-xl p-4 border border-slate-100">
                    <p class="text-[10px] text-slate-500 font-bold mb-2">محتويات الطلب:</p>
                    <div id="res-items" class="flex flex-wrap gap-1.5"></div>
                </div>

                <!-- زرار التعديل (يظهر فقط لو الطلب جديد) -->
                <a id="btn-edit-whatsapp" href="#" target="_blank" class="hidden w-full mt-4 bg-white border-2 border-brand-primary text-brand-primary hover:bg-emerald-50 font-black py-3 rounded-xl transition-all flex justify-center items-center gap-2 text-sm">
                    <i class="fa-brands fa-whatsapp text-lg"></i> محتاج أعدل في الطلب
                </a>

            </div>
        </div>
    </main>

    <script>
        // --- 1. إعدادات فايربيس (تم أخذها من الكود الخاص بك) ---
        const firebaseConfig = { 
            apiKey: "AIzaSyD7ZJP8n8fhMewPfEsTBANn0h9To_q15BY", 
            authDomain: "sman-ca8f8.firebaseapp.com", 
            projectId: "sman-ca8f8", 
            storageBucket: "sman-ca8f8.firebasestorage.app", 
            messagingSenderId: "538778803310", 
            appId: "1:538778803310:web:5eeff42bae534375a21a7f" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- 2. دالة تنظيف الرقم (نفس المستخدمة في السيستم بتاعك) ---
        function normalizePhone(phone) {
            if (!phone) return '';
            let normalized = phone.toString()
                .replace(/[\u0660-\u0669]/g, c => c.charCodeAt(0) - 0x0660)
                .replace(/[\u06F0-\u06F9]/g, c => c.charCodeAt(0) - 0x06F0);
            normalized = normalized.replace(/\D/g, '');
            if (normalized.length >= 10) {
                if (normalized.startsWith('0020')) normalized = '0' + normalized.substring(4);
                else if (normalized.startsWith('201')) normalized = '0' + normalized.substring(2);
                else if (normalized.length === 10 && normalized.startsWith('1')) normalized = '0' + normalized;
            }
            return normalized;
        }

        // --- 3. المنطق الأساسي للبحث والتتبع ---
        async function trackOrder() {
            let rawPhone = document.getElementById('customer-phone').value;
            let phone = normalizePhone(rawPhone);
            let err = document.getElementById('error-msg');
            let btn = document.getElementById('btn-track');

            if (phone.length < 10) {
                err.innerText = "يرجى إدخال رقم موبايل صحيح (11 رقم).";
                err.classList.remove('hidden'); return;
            }

            err.classList.add('hidden');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري البحث...';
            btn.disabled = true;

            try {
                // 1. البحث عن آخر طلب للعميل
                let ordersSnap = await db.collection('orders').where('customerPhone', '==', phone).get();
                let orders = [];
                ordersSnap.forEach(doc => orders.push({id: doc.id, ...doc.data()}));
                
                // تصفية الطلبات الممسوحة أو الملغية
                orders = orders.filter(o => o.status !== 'trash' && o.status !== 'canceled');

                if (orders.length === 0) {
                    err.innerText = "مفيش أوردرات نشطة مسجلة بالرقم ده حالياً.";
                    err.classList.remove('hidden');
                    resetBtn(btn); return;
                }

                // ترتيب الطلبات عشان نجيب الأحدث
                orders.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                let latestOrder = orders[0];

                // 2. البحث عن بيانات كارت الولاء
                let cleanPhoneDb = phone.startsWith('0') ? phone : '0' + phone;
                let customerSnap = await db.collection('customers').doc(cleanPhoneDb).get();
                let ordersCount = customerSnap.exists ? (customerSnap.data().ordersCount || 1) : 1;

                // 3. عرض النتيجة
                displayResult(latestOrder, ordersCount);

            } catch (error) {
                console.error(error);
                err.innerText = "حدث خطأ في الاتصال، حاول مرة أخرى.";
                err.classList.remove('hidden');
            }
            resetBtn(btn);
        }

        function resetBtn(btn) {
            btn.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i> تتبع الطلب';
            btn.disabled = false;
        }

        // --- 4. دالة عرض البيانات ---
        function displayResult(order, totalOrders) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');

            document.getElementById('res-name').innerText = (order.customerName && order.customerName !== 'عميل') ? order.customerName.split(' ')[0] : 'يا فندم';
            document.getElementById('res-total').innerText = order.total || 0;

            // كارت الولاء
            let loyaltyCard = document.getElementById('loyalty-card');
            let loyaltyMsg = document.getElementById('loyalty-msg');
            loyaltyCard.classList.remove('hidden');
            
            if (totalOrders === 1) {
                loyaltyMsg.innerText = "نورتنا! ده أول أوردر ليك معانا، ويارب ميكونش الأخير.";
            } else if (totalOrders % 5 === 0) {
                loyaltyMsg.innerText = `عاش! ده أوردرك رقم ${totalOrders}.. إنت كده من الـ VIP بتوعنا 🌟`;
            } else {
                let remainder = 5 - (totalOrders % 5);
                loyaltyMsg.innerText = `ده أوردرك رقم ${totalOrders}.. فاضلك ${remainder} أوردرات وتاخد هديتك!`;
            }

            // تفاصيل الأصناف
            let itemsHtml = order.items ? order.items.map(i => `<span class="bg-white border border-slate-200 px-2.5 py-1 rounded-lg text-[10px] font-black text-slate-700 shadow-sm">${i.quantity}x ${i.name}</span>`).join('') : '<span class="text-xs">بدون تفاصيل</span>';
            document.getElementById('res-items').innerHTML = itemsHtml;

            // تحديث شريط الحالة
            updateTimeline(order);
        }

        function updateTimeline(order) {
            let s = order.status;
            let title = "";
            let pWidth = "0%";
            let activeSteps = 0;
            let driverNoteEl = document.getElementById('res-driver-note');
            let editBtn = document.getElementById('btn-edit-whatsapp');

            // إخفاء الزراير والملاحظات كوضع افتراضي
            driverNoteEl.classList.add('hidden');
            editBtn.classList.add('hidden');

            if (s === 'new') {
                title = "تم استلام الطلب 📝"; pWidth = "0%"; activeSteps = 1;
                // السماح بالتعديل طالما لسه مفيش تجهيز
                let waMsg = encodeURIComponent(`أهلاً، كنت حابب أعدل في الأوردر بتاعي (باسم ${order.customerName}).`);
                editBtn.href = `https://wa.me/201000000000?text=${waMsg}`; // حط رقم واتساب الشغل هنا بدل الأصفار
                editBtn.classList.remove('hidden');
                editBtn.classList.add('flex');
            } 
            else if (s === 'processing' || s === 'deferred' || s === 'no_answer') {
                title = "جاري التجهيز ⏳"; pWidth = "50%"; activeSteps = 2;
                if (order.driverName) {
                    title = "خرج مع المندوب 🛵"; pWidth = "100%"; activeSteps = 3;
                    driverNoteEl.innerHTML = `مندوبنا (الكابتن ${order.driverName}) استلم الأوردر وفي طريقه ليك.`;
                    driverNoteEl.classList.remove('hidden');
                }
            } 
            else if (s === 'completed') {
                title = "تم التوصيل بنجاح ✅"; pWidth = "100%"; activeSteps = 3;
                driverNoteEl.innerHTML = "بالهنا والشفا! نتمنى تكون التجربة عجبتك.";
                driverNoteEl.classList.remove('hidden');
            }

            document.getElementById('res-status-title').innerText = title;
            
            // تلوين الخطوات (Timeout عشان الـ Animation تبان ناعمة)
            setTimeout(() => {
                document.getElementById('progress-line').style.width = pWidth;
                for (let i = 1; i <= 3; i++) {
                    let icon = document.getElementById(`step-${i}-icon`);
                    let text = document.getElementById(`step-${i}-text`);
                    if (i <= activeSteps) {
                        icon.className = "w-8 h-8 rounded-full border-4 border-white shadow-sm flex items-center justify-center text-xs bg-brand-primary text-white transition-colors duration-500";
                        text.className = "text-[10px] font-black text-brand-primary transition-colors duration-500";
                    } else {
                        icon.className = "w-8 h-8 rounded-full border-4 border-white shadow-sm flex items-center justify-center text-[10px] bg-slate-200 text-slate-400";
                        text.className = "text-[9px] font-bold text-slate-400";
                    }
                }
            }, 100);
        }

        // لو العميل جاي من لينك سحري زي: track.html?phone=010...
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const phoneParam = urlParams.get('phone');
            if(phoneParam) {
                document.getElementById('customer-phone').value = phoneParam;
                trackOrder();
            }
        };
    </script>
</body>
</html>
